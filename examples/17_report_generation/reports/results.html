<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Report — Report Generation Suite</title>
  <style>
  html, body { height: 100%; }

  /* Dark theme (default) */
  :root {
    --fg: #e5e5e5;
    --bg: #1a1a1a;
    --bg-gradient: linear-gradient(135deg, #252525 0%, #2f2f2f 50%, #282828 100%);
    --muted: #a8a8a8;
    --accent: #999999;
    --card: rgba(40, 40, 40, 0.8);
    --card-hover: rgba(48, 48, 48, 0.9);
    --border: rgba(110, 110, 110, 0.25);
    --glass-bg: rgba(35, 35, 35, 0.7);
    --glass-border: rgba(255, 255, 255, 0.12);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    --passed: #3fb950;
    --failed: #f85149;
    --passed-bg: rgba(63, 185, 80, 0.12);
    --failed-bg: rgba(248, 81, 73, 0.12);
    --total-bg: rgba(88, 166, 255, 0.12);
    --duration-bg: rgba(139, 148, 158, 0.12);
    --total-fg: #58a6ff;
    --duration-fg: #8b949e;
  }

  /* Light theme */
  [data-theme="light"] {
    --fg: #374151;
    --bg: #f9fafb;
    --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #f9fafb 50%, #f3f5f7 100%);
    --muted: #6b7280;
    --accent: #3b82f6;
    --card: rgba(255, 255, 255, 0.75);
    --card-hover: rgba(255, 255, 255, 0.95);
    --border: rgba(100, 110, 150, 0.15);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-border: rgba(0, 0, 0, 0.06);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --passed: #22863a;
    --failed: #cb2431;
    --passed-bg: rgba(34, 134, 58, 0.1);
    --failed-bg: rgba(203, 36, 49, 0.1);
    --total-bg: rgba(59, 130, 246, 0.1);
    --duration-bg: rgba(107, 114, 128, 0.1);
    --total-fg: #3b82f6;
    --duration-fg: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--fg);
    line-height: 1.5;
    font-size: 13px;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .report-container { max-width: 1000px; margin: 0 auto; padding: 16px; }

  /* Sticky header */
  .report-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 0 0 20px;
    padding: 12px 20px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
    min-height: 50px;
  }
  .report-head-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .report-head-left .logo {
    color: var(--fg);
    flex-shrink: 0;
  }
  .report-head-left h1 {
    margin: 0;
    font-size: 18px;
    line-height: 28px;
    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #888888 0%, #d0d0d0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  [data-theme="light"] .report-head-left h1 {
    background: linear-gradient(135deg, #4a5568 0%, #718096 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .report-head-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .theme-toggle {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    color: var(--fg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  .theme-toggle:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    background: var(--card-hover);
  }
  .search-input {
    min-width: 220px;
    height: 36px;
    padding: 0 16px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    color: var(--fg);
    outline: none;
    font-size: 13px;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(77, 159, 255, 0.2);
    background: var(--card);
  }
  .search-input::placeholder { color: var(--muted); }

  /* Summary boxes */
  .summary-boxes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-box {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    border-radius: 16px;
    background: var(--card);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
  }
  .summary-box:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
  }
  .summary-box .box-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .summary-box .box-icon svg { width: 22px; height: 22px; }
  .summary-box .box-content { display: flex; flex-direction: column; }
  .summary-box .box-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .summary-box .box-value {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
  }
  .summary-box .box-sub {
    font-size: 11px;
    margin-top: 2px;
  }
  .box-passed .box-icon { background: var(--passed-bg); color: var(--passed); }
  .box-passed .box-value { color: var(--passed); }
  .box-failed .box-icon { background: var(--failed-bg); color: var(--failed); }
  .box-failed .box-value { color: var(--failed); }
  .box-total .box-icon { background: var(--total-bg); color: var(--total-fg); }
  .box-total .box-value { color: var(--total-fg); }
  .box-duration .box-icon { background: var(--duration-bg); color: var(--duration-fg); }
  .box-duration .box-value { color: var(--duration-fg); }

  /* Suite sections */
  .suite {
    background: var(--card);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    margin-bottom: 14px;
    padding: 16px;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
  }
  .suite:hover {
    border-color: var(--accent);
    background: var(--card-hover);
  }
  .suite h2 {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    margin: 0;
    font-weight: 600;
    cursor: pointer;
  }
  .suite-count {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-left: auto;
  }
  .toggle {
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    transition: all 0.3s ease;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle:hover { background: var(--accent); color: white; }
  .toggle .chevron {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    transform: rotate(90deg);
  }
  .toggle.collapsed .chevron { transform: rotate(0deg); }
  .badge {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }
  .badge.passed { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; }
  .badge.failed { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; }
  .suite-steps {
    animation: slideDown 0.3s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .testcase {
    padding: 8px 12px;
    border-radius: 10px;
    margin: 4px 0;
    font-size: 13px;
    transition: background 0.2s ease;
    border: 1px solid transparent;
  }
  .testcase.passed { color: var(--passed); }
  .testcase.passed:hover { background: var(--passed-bg); border-color: var(--glass-border); }
  .testcase.failed { color: var(--failed); }
  .testcase.failed:hover { background: var(--failed-bg); border-color: var(--glass-border); }
  .failure {
    margin: 8px 0 4px 24px;
    padding: 10px 12px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    font-size: 12px;
    color: var(--fg);
    backdrop-filter: blur(10px);
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  .failure strong { color: var(--muted); }
  .duration { color: var(--muted); font-size: 12px; }
  .empty { color: var(--muted); font-style: italic; font-size: 12px; }

  /* Footer */
  .report-footer {
    margin: 32px 0 0;
    padding: 16px 20px;
    text-align: center;
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid var(--glass-border);
    font-size: 12px;
    color: var(--muted);
  }
  .report-footer a {
    background: linear-gradient(135deg, #888888 0%, #d0d0d0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.3s ease;
  }
  .report-footer a:hover { opacity: 0.8; }
  [data-theme="light"] .report-footer a {
    background: linear-gradient(135deg, #4a5568 0%, #718096 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Smooth transitions for theme switching */
  * { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }

  @media (max-width: 700px) {
    .summary-boxes { grid-template-columns: repeat(2, 1fr); }
    .report-header { flex-wrap: wrap; }
    .search-input { min-width: 160px; }
  }

  </style>
</head>

  <script>
    function toggleSuite(idx) {
      var steps = document.getElementById('suite-steps-' + idx);
      var toggle = document.getElementById('toggle-' + idx);
      if (!steps) { return; }
      if (steps.style.display === 'none') {
        steps.style.display = 'block';
        if (toggle) { toggle.classList.remove('collapsed'); }
      } else {
        steps.style.display = 'none';
        if (toggle) { toggle.classList.add('collapsed'); }
      }
    }
    (function setUpSearch(){
      var input = document.getElementById('search-input');
      if (!input) { return; }
      function applyFilter(){
        var q = (input.value || '').toLowerCase().trim();
        var nodes = document.querySelectorAll('section.suite');
        for (var i = 0; i < nodes.length; i++){
          var sec = nodes[i];
          var text = (sec.textContent || '').toLowerCase();
          var match = !q || text.indexOf(q) !== -1;
          sec.style.display = match ? '' : 'none';
        }
      }
      input.addEventListener('input', applyFilter);
    })();
    (function setupTheme() {
      var toggle = document.getElementById('theme-toggle');
      var root = document.documentElement;
      var currentTheme = localStorage.getItem('report-theme') || 'dark';
      root.setAttribute('data-theme', currentTheme);
      updateThemeIcon(currentTheme);
      toggle.addEventListener('click', function() {
        var theme = root.getAttribute('data-theme');
        var newTheme = theme === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', newTheme);
        localStorage.setItem('report-theme', newTheme);
        updateThemeIcon(newTheme);
      });
      function updateThemeIcon(theme) {
        var sunIcon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';
        var moonIcon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
        toggle.innerHTML = theme === 'dark' ? sunIcon : moonIcon;
      }
    })();
    document.addEventListener('keydown', function(e) {
      if (!(e.metaKey || e.ctrlKey)) { return; }
      var key = e.key && e.key.toLowerCase();
      if (key === 'a') {
        var el = document.activeElement;
        if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) { el.select(); }
        else { document.execCommand('selectAll'); }
        e.preventDefault(); e.stopPropagation();
      } else if (key === 'c') {
        document.execCommand('copy'); e.preventDefault(); e.stopPropagation();
      } else if (key === 'x') {
        document.execCommand('cut'); e.preventDefault(); e.stopPropagation();
      } else if (key === 'v') {
        document.execCommand('paste'); e.preventDefault(); e.stopPropagation();
      } else if (key === 'f') {
        var si = document.getElementById('search-input');
        if (si) { si.focus(); e.preventDefault(); e.stopPropagation(); }
      }
    }, true);
  </script>
